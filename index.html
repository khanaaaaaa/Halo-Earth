<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Halo: Earth</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<header>
  <p>What if Earth had rings?</p>
  <h1>HALO: EARTH</h1>
</header>

<div id="controls">
    <div class="ctrl">
        <label for="city">City</label>
        <select id="city">
            <option>London</option>
            <option>Kathmandu</option>
            <option>Tokyo</option>
            <option>New York</option>
            <option>Sydney</option>
        </select>
    </div>

    <div class="ctrl">
        <label for="time">Time of Day</label>
        <div class="time-row">
            <input type="range" id="time" min="0" max="23.98" step="0.05" valu="12" />
            <span id="timeLabel">12:00</span>
        </div>
        <div class="auto-row">
            <input type="checkbox" id="autoPlay" />
            <label for="autoPlay">Auto-play</label>
        </div>
    </div>

    <div class="ctrl">
        <label for="thickness">Ring Thickness</label>
        <select id="thickness">
            <option value="thin">Thin</option>
            <option value="medium">Medium</option>
            <option value="saturn" selected>Saturn-like</option>
            <option value="extreme">Extreme</option>
        </select>
    </div>
    <div class="ctrl">
        <label for="ringOpacity">Ring Opacity</label>
        <input type="range" id="ringOpacity" min="0.1" max="1" step="0.05" value="1" />
    </div>

    <div class="ctrl">
        <label for="ringOpacity">Ring Opacity</label>
        <input type="range" id="ringOpacity" min="0.1" max="1" step="0.05" value="1" />
    </div>

    <div class="ctrl">
        <label for="ringTilt">Ring Tilt Override</label>
        <div class="time-row">
            <input type="range" id="ringTilt" min="0" max="90" step="1" value="-1" />
            <soan id="tiltLabel">Auto</soan>
        </div>
    </div>

    <div class="ctrl">
        <label>Spped</label>
        <div class="speed-btns">
            <button class="speed-btn active" data-speed="0.004">1</button>
            <button class="speed-btn" data-speed="0.016">4x</button>
            <button class="speed-btn" data-speed="0.04">10x</button>
        </div>
    </div>

    <button id="standBtn">Stand Outside</button>
</div>

<div id="tooltip"></div>
