<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Halo: Earth</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100;200;300;400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<header>
  <p class="header-sub">What if the Earth had rings?</p>
  <h1>HALO: EARTH</h1>
</header>

<div id="controls">
  <div class="ctrl">
    <label for="city">City</label>
    <select id="city">
      <option>London</option>
      <option>Kathmandu</option>
      <option>Tokyo</option>
      <option>New York</option>
      <option>Sydney</option>
      <option>Singapore</option>
      <option>Cairo</option>
      <option>Reykjavik</option>
    </select>
  </div>

  <div class="ctrl">
    <label for="time">Time — <span id="timeLabel">12:00</span></label>
    <input type="range" id="time" min="0" max="23.98" step="0.05" value="12" />
    <div class="auto-row">
      <input type="checkbox" id="autoPlay" />
      <label for="autoPlay" class="inline-label">Auto-play</label>
    </div>
  </div>

  <div class="ctrl">
    <label>Speed</label>
    <div class="btn-group">
      <button class="tog-btn active" data-speed="0.004">1×</button>
      <button class="tog-btn" data-speed="0.016">4×</button>
      <button class="tog-btn" data-speed="0.05">12×</button>
    </div>
  </div>

  <div class="ctrl">
    <label for="thickness">Ring Thickness</label>
    <select id="thickness">
      <option value="thin">Thin</option>
      <option value="medium">Medium</option>
      <option value="saturn" selected>Saturn-like</option>
      <option value="extreme">Extreme</option>
    </select>
  </div>

  <div class="ctrl">
    <label for="ringOpacity">Ring Opacity</label>
    <input type="range" id="ringOpacity" min="0.05" max="1" step="0.05" value="1" />
  </div>

  <div class="ctrl">
    <label for="ringTilt">Ring Tilt — <span id="tiltLabel">Auto</span></label>
    <input type="range" id="ringTilt" min="-1" max="90" step="1" value="-1" />
  </div>

  <div class="ctrl">
    <label>Season</label>
    <div class="btn-group">
      <button class="tog-btn active" data-season="0">Spring</button>
      <button class="tog-btn" data-season="1">Summer</button>
      <button class="tog-btn" data-season="2">Autumn</button>
      <button class="tog-btn" data-season="3">Winter</button>
    </div>
  </div>

  <button id="standBtn">🌍 Stand Outside</button>
</div>

<div id="tooltip"></div>
<div id="ringInfo"></div>
<canvas id="sky"></canvas>

<script src="cities.js"></script>
<script src="sky.js"></script>
<script src="stars.js"></script>
<script src="rings.js"></script>
<script src="clouds.js"></script>
<script src="aurora.js"></script>
<script src="app.js"></script>
</body>
</html>
